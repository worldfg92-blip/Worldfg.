<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Viewer</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
}

.story{
  width:100%;
  height:100vh;
  position:absolute;
  transition:0.3s;
}

img{
  width:100%;
  height:100vh;
  object-fit:cover;
}

.progress{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  gap:5px;
}

.bar{
  flex:1;
  height:3px;
  background:#333;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#fff;
}
</style>
</head>

<body>

<div class="progress">
  <div class="bar"><div class="fill"></div></div>
  <div class="bar"><div class="fill"></div></div>
  <div class="bar"><div class="fill"></div></div>
</div>

<div class="story" id="story">
  <img src="https://picsum.photos/500/900">
</div>

<script>
let index = 0;
let fills = document.querySelectorAll(".fill");

function playStory(){
  let fill = fills[index];
  let width = 0;

  let interval = setInterval(()=>{
    width += 2;
    fill.style.width = width + "%";

    if (width >= 100){
      clearInterval(interval);
      nextStory();
    }
  },50);
}

function nextStory(){
  index++;

  if (index >= fills.length){
    index = 0;
    fills.forEach(f => f.style.width = "0%");
  }

  playStory();
}

document.body.addEventListener("click", nextStory);

playStory();
</script>

</body>
</html>
