<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldFG Chat</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <script src="firebase.js"></script>
  
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }
    
    #messages {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }
    
    .msg {
      margin: 5px;
      padding: 8px;
      border-radius: 10px;
      background: #111;
    }
    
    .inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }
    
    input {
      flex: 1;
      padding: 10px;
      border: none;
    }
    
    button {
      padding: 10px;
      background: #3897f0;
      color: #fff;
      border: none;
    }
  </style>
  
</head>

<body>
  
  <div id="messages">Loading chat...</div>
  
  <div class="inputBox">
    <input id="text" placeholder="Message...">
    <button onclick="send()">Send</button>
  </div>
  
  <script>
    let otherUid = "REPLACE_WITH_USER_UID"; // IMPORTANT
    
    firebase.auth().onAuthStateChanged(user => {
      
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      
      loadMessages();
      
    });
    
    function loadMessages() {
      
      listenMessages(otherUid, msgs => {
        
        const box = document.getElementById("messages");
        box.innerHTML = "";
        
        msgs.forEach(m => {
          
          box.innerHTML += `
<div class="msg">
${m.text}
</div>
`;
          
        });
        
      });
      
    }
    
    function send() {
      
      const text = document.getElementById("text").value;
      
      if (!text) return;
      
      sendMessage(otherUid, text);
      
      document.getElementById("text").value = "";
      
    }
  </script>
  
</body>

</html>
