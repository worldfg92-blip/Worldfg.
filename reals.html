<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldFG Reels</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

.reel{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:80px;
left:10px;
color:white;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
color:white;
padding:10px;
background:rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div id="reels"></div>

<div class="nav">
<span onclick="goHome()">🏠</span>
<span onclick="upload()">➕</span>
<span>❤️</span>
<span>💬</span>
</div>

<input type="file" id="file" style="display:none">

<script>

firebase.auth().onAuthStateChanged(user=>{

if(!user){
window.location.href="login.html";
return;
}

loadReels();

});

function goHome(){
window.location.href="index.html";
}

function upload(){
document.getElementById("file").click();
}

document.getElementById("file").onchange = async function(){

const file = this.files[0];

if(!file) return;

await uploadReel(file,"My Reel");

alert("Reel uploaded!");
loadReels();

};

function loadReels(){

listenReels(reels=>{

const box = document.getElementById("reels");
box.innerHTML = "";

reels.forEach(r=>{

box.innerHTML += `
<div class="reel">
<video src="${r.videoUrl}" controls autoplay loop></video>

<div class="overlay">
<b>${r.user}</b>
<p>${r.caption||""}</p>
</div>
</div>
`;

});

});

}

</script>

</body>
</html>
